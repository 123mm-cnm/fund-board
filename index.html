<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中心经费管理看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;background:#f7f7f8;min-height:100vh;padding:32px 24px;color:#1a1a1a}
.dash{max-width:960px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.header-left{display:flex;align-items:baseline;gap:12px}
.header h1{font-size:20px;font-weight:600;color:#1a1a1a}
.header .sub{font-size:13px;color:#999}
.module-tabs{display:flex;gap:6px;margin-bottom:24px;width:fit-content}
.module-tab{padding:10px 22px;font-size:13px;color:#888;cursor:pointer;border-radius:10px;transition:all .2s;font-weight:500;user-select:none;background:#fff;border:0.5px solid rgba(0,0,0,.06);position:relative}
.module-tab.active{background:#534AB7;color:#fff;border-color:#534AB7}
.module-tab:hover:not(.active){color:#1a1a1a;background:#f5f5f5}
.module-tab .tab-badge{display:block;font-size:10px;font-weight:400;opacity:.75;margin-top:2px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:#fff;border-radius:12px;padding:18px 20px;border:0.5px solid rgba(0,0,0,.06)}
.metric-card .label{font-size:12px;color:#888;margin-bottom:8px;letter-spacing:.3px}
.metric-card .value{font-size:22px;font-weight:600;color:#1a1a1a}
.metric-card .value.positive{color:#0F6E56}
.metric-card .value.negative{color:#c0392b}
.metric-card .detail{font-size:11px;color:#bbb;margin-top:6px}
.card{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,.06);padding:24px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.filter-tabs{display:flex;gap:0;border-bottom:1px solid #f0f0f0}
.filter-tab{padding:10px 18px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.filter-tab.active{color:#1a1a1a;border-bottom-color:#534AB7}
.filter-tab:hover{color:#1a1a1a}
.btn-add{display:flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid #e8e8e8;background:#fff;color:#534AB7;font-weight:500;transition:all .15s}
.btn-add:hover{background:#f8f6ff;border-color:#534AB7}
.table-wrap{overflow-x:auto;margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 10px;font-weight:500;color:#999;border-bottom:1px solid #f0f0f0;font-size:12px;white-space:nowrap}
td{padding:12px 10px;border-bottom:1px solid #f8f8f8;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.row-edit{opacity:0;width:24px;height:24px;border-radius:6px;border:none;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;color:#bbb;font-size:14px}
tr:hover .row-edit{opacity:1}
.row-edit:hover{background:#f0ecff;color:#534AB7}
.type-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.type-in{background:#e8f8f2;color:#0F6E56}
.type-out{background:#fef0eb;color:#c0392b}
.amount-in{color:#0F6E56;font-weight:600}
.amount-out{color:#1a1a1a;font-weight:500}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 0 0}
.pager-info{font-size:12px;color:#bbb}
.pager-btns{display:flex;gap:6px}
.pager-btns button{padding:6px 14px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid #e8e8e8;background:#fff;color:#1a1a1a;transition:all .15s;font-weight:500}
.pager-btns button:hover{background:#f5f5f5;border-color:#ddd}
.pager-btns button:disabled{opacity:.3;cursor:not-allowed}
.pager-btns button.active-page{background:#534AB7;color:#fff;border-color:#534AB7}
th.r,td.r{text-align:right}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#ccc}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:20px;color:#1a1a1a}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
.form-group select,.form-group input{width:100%;padding:10px 12px;border:1px solid #e8e8e8;border-radius:8px;font-size:13px;color:#1a1a1a;outline:none;transition:border .2s;font-family:inherit}
.form-group select:focus,.form-group input:focus{border-color:#534AB7}
.form-group input[readonly]{background:#f7f7f8;color:#888}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.form-actions button{padding:9px 20px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:500;border:none;transition:all .15s}
.btn-cancel{background:#f5f5f5;color:#666}
.btn-cancel:hover{background:#eee}
.btn-submit{background:#534AB7;color:#fff}
.btn-submit:hover{background:#4339a0}
.btn-delete{background:#fff;color:#e74c3c;border:1px solid #fde;padding:9px 20px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:500;transition:all .15s}
.btn-delete:hover{background:#fff5f5;border-color:#e74c3c}
.empty-state{text-align:center;padding:40px 0;color:#bbb;font-size:13px}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <div class="header-left">
      <h1>中心经费管理</h1>
      <span class="sub">资金产品中心 · 内部看板</span>
    </div>
  </div>
  
  <div class="module-tabs" id="moduleTabs">
    <div class="module-tab active" data-module="hand">中心小金罐<span class="tab-badge">日常收支</span></div>
    <div class="module-tab" data-module="system">系统账户<span class="tab-badge">待取出</span></div>
  </div>

  <div class="metrics" id="metrics"></div>
  
  <div class="card">
    <div class="card-header">
      <div class="filter-tabs" id="filterTabs"></div>
      <button class="btn-add" onclick="openModal()">+ 新增记录</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager" id="pager"></div>
  </div>
  <div class="footer">中心内部经费管理 · 仅供内部查阅</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">新增记录</h2>
    <div class="form-group">
      <label>类型</label>
      <select id="formType"></select>
    </div>
    <div class="form-group">
      <label>时间</label>
      <input type="date" id="formDate">
    </div>
    <div class="form-group">
      <label id="formDescLabel">说明</label>
      <input type="text" id="formDesc" placeholder="输入说明...">
    </div>
    <div class="form-group" id="formPersonGroup">
      <label>负责人</label>
      <input type="text" id="formPerson" placeholder="输入负责人...">
    </div>
    <div class="form-group">
      <label>金额</label>
      <input type="number" id="formAmount" placeholder="输入金额" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>变动后余额（自动计算）</label>
      <input type="text" id="formBalance" readonly>
    </div>
    <div class="form-actions">
      <button class="btn-delete" id="btnDelete" onclick="deleteRecord()" style="display:none">删除此条</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitForm()">确认添加</button>
    </div>
  </div>
</div>

const DEFAULT_SYS = [

{id:2,type:"收入",desc:"2024年5月经费下发",amount:3195,date:"2024-06-27",balance:44873.34},

{id:13,type:"支出",desc:"25年团建经费下发",amount:30735.60,date:"2025-11-14",balance:0},

{id:17,type:"收入",desc:"经费发放",amount:4500,date:"2026-02-20",balance:16100},
{id:18,type:"收入",desc:"经费发放",amount:4500,date:"2026-03-01",balance:20600},
{id:19,type:"收入",desc:"调拨转入",amount:4200,date:"2026-03-20",balance:24800},
{id:20,type:"收入",desc:"奖金注入",amount:2872.04,date:"2026-03-20",balance:27672.04},
{id:21,type:"收入",desc:"经费发放",amount:4500,date:"2026-04-20",balance:32172.04}
];

function loadData(key, defaults) {
  try {
    const saved = localStorage.getItem(key);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [...defaults];
}
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

let handData = loadData(STORAGE_KEY_HAND, DEFAULT_HAND);
let sysData = loadData(STORAGE_KEY_SYS, DEFAULT_SYS);

// ===== STATE =====
let currentModule = 'hand';
let currentFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 10;

function getData() { return currentModule === 'hand' ? handData : sysData; }
function setData(d) {
  if (currentModule === 'hand') { handData = d; saveData(STORAGE_KEY_HAND, d); }
  else { sysData = d; saveData(STORAGE_KEY_SYS, d); }
}

// ===== UTILS =====
function fmt(n) { return Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[0]}.${parseInt(parts[1])}.${parseInt(parts[2])}`;
}

// ===== RENDER =====
function renderMetrics() {
  const data = getData();
  const totalIn = data.filter(d=>d.type==='收入').reduce((s,d)=>s+d.amount,0);
  const totalOut = data.filter(d=>d.type==='支出').reduce((s,d)=>s+d.amount,0);
  const balance = data.length ? data[data.length-1].balance : 0;
  const count = data.length;
  
  const balLabel = currentModule === 'hand' ? '小金罐余额' : '系统账户余额（待取出）';
  
  document.getElementById('metrics').innerHTML = `
    <div class="metric-card">
      <div class="label">${balLabel}</div>
      <div class="value ${balance>=0?'positive':'negative'}">¥${balance<0?'-':''}${fmt(balance)}</div>
      <div class="detail">截至最新记录</div>
    </div>
    <div class="metric-card">
      <div class="label">累计${currentModule==='hand'?'收入':'拨入'}</div>
      <div class="value positive">¥${fmt(totalIn)}</div>
      <div class="detail">${data.filter(d=>d.type==='收入').length} 笔</div>
    </div>
    <div class="metric-card">
      <div class="label">累计${currentModule==='hand'?'支出':'取出'}</div>
      <div class="value">¥${fmt(totalOut)}</div>
      <div class="detail">${data.filter(d=>d.type==='支出').length} 笔</div>
    </div>
    <div class="metric-card">
      <div class="label">交易笔数</div>
      <div class="value">${count}</div>
      <div class="detail">共 ${count} 笔记录</div>
    </div>
  `;
}

function renderFilterTabs() {
  const labels = currentModule === 'hand' 
    ? [{k:'all',l:'全部'},{k:'out',l:'支出'},{k:'in',l:'收入'}]
    : [{k:'all',l:'全部'},{k:'in',l:'拨入'},{k:'out',l:'取出'}];
  
  let html = '';
  labels.forEach(t => {
    html += `<div class="filter-tab ${currentFilter===t.k?'active':''}" data-filter="${t.k}">${t.l}</div>`;
  });
  document.getElementById('filterTabs').innerHTML = html;
}

function renderTableHead() {
  const cols = currentModule === 'hand'
    ? `<tr><th style="width:36px">#</th><th style="width:52px">类型</th><th style="min-width:150px">说明</th><th style="width:80px">负责人</th><th class="r" style="width:95px">金额</th><th style="width:85px">时间</th><th class="r" style="width:95px">余额</th><th style="width:32px"></th></tr>`
    : `<tr><th style="width:36px">#</th><th style="width:52px">类型</th><th style="min-width:180px">备注</th><th class="r" style="width:100px">金额</th><th style="width:90px">时间</th><th class="r" style="width:110px">系统内余额</th><th style="width:32px"></th></tr>`;
  document.getElementById('thead').innerHTML = cols;
}

function getFiltered() {
  const data = getData();
  let filtered = [...data];
  if (currentFilter === 'in') filtered = filtered.filter(d=>d.type==='收入');
  if (currentFilter === 'out') filtered = filtered.filter(d=>d.type==='支出');
  return filtered.reverse();
}

function renderTable() {
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);
  
  let html = '';
  if (pageData.length === 0) {
    const colSpan = currentModule === 'hand' ? 8 : 7;
    html = `<tr><td colspan="${colSpan}" class="empty-state">暂无记录</td></tr>`;
  } else {
    pageData.forEach(d => {
      const typeClass = d.type==='收入' ? 'type-in' : 'type-out';
      const typeLabel = currentModule === 'hand' 
        ? d.type 
        : (d.type==='收入' ? '拨入' : '取出');
      const amtClass = d.type==='收入' ? 'amount-in' : 'amount-out';
      const sign = d.type==='收入' ? '+' : '\u2212';
      
      if (currentModule === 'hand') {
        html += `<tr>
          <td>${d.id}</td>
          <td><span class="type-tag ${typeClass}">${typeLabel}</span></td>
          <td title="${d.desc}">${d.desc}</td>
          <td>${d.person||''}</td>
          <td class="r ${amtClass}">${sign}${fmt(d.amount)}</td>
          <td>${fmtDate(d.date)}</td>
          <td class="r" style="color:${d.balance>=0?'#0F6E56':'#c0392b'};font-weight:500">${d.balance<0?'-':''}¥${fmt(d.balance)}</td>
          <td><button class="row-edit" onclick="openEdit(${d.id})" title="编辑">✎</button></td>
        </tr>`;
      } else {
        html += `<tr>
          <td>${d.id}</td>
          <td><span class="type-tag ${typeClass}">${typeLabel}</span></td>
          <td title="${d.desc}">${d.desc}</td>
          <td class="r ${amtClass}">${sign}${fmt(d.amount)}</td>
          <td>${fmtDate(d.date)}</td>
          <td class="r" style="color:${d.balance>=0?'#0F6E56':'#c0392b'};font-weight:500">¥${fmt(d.balance)}</td>
          <td><button class="row-edit" onclick="openEdit(${d.id})" title="编辑">✎</button></td>
        </tr>`;
      }
    });
  }
  document.getElementById('tbody').innerHTML = html;
  
  // pager
  const filtered2 = filtered;
  const tp = Math.max(1, Math.ceil(filtered2.length / PAGE_SIZE));
  let pagerHtml = `<span class="pager-info">共 ${filtered2.length} 条，第 ${currentPage}/${tp} 页</span><div class="pager-btns">`;
  pagerHtml += `<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">上一页</button>`;
  const maxShow = 5;
  let pStart = Math.max(1, currentPage - 2);
  let pEnd = Math.min(tp, pStart + maxShow - 1);
  if (pEnd - pStart < maxShow - 1) pStart = Math.max(1, pEnd - maxShow + 1);
  for (let i=pStart; i<=pEnd; i++) {
    pagerHtml += `<button class="${i===currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pagerHtml += `<button ${currentPage>=tp?'disabled':''} onclick="goPage(${currentPage+1})">下一页</button></div>`;
  document.getElementById('pager').innerHTML = pagerHtml;
}

function renderAll() {
  renderMetrics();
  renderFilterTabs();
  renderTableHead();
  renderTable();
}

function goPage(p) { currentPage = p; renderTable(); }

// ===== MODULE SWITCH =====
document.getElementById('moduleTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('module-tab') || e.target.classList.contains('active')) return;
  document.querySelectorAll('.module-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  currentModule = e.target.dataset.module;
  currentFilter = 'all';
  currentPage = 1;
  renderAll();
});

// ===== FILTER SWITCH =====
document.getElementById('filterTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-tab')) return;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  currentPage = 1;
  renderTable();
});

// ===== MODAL =====
let editingId = null; // null = new record mode, number = editing mode

function openModal() {
  editingId = null;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('show');
  
  const typeSelect = document.getElementById('formType');
  if (currentModule === 'hand') {
    typeSelect.innerHTML = '<option value="支出">支出</option><option value="收入">收入</option>';
    document.getElementById('formDescLabel').textContent = '说明';
    document.getElementById('formDesc').placeholder = '如：xxx生日（6人参加）';
    document.getElementById('formPersonGroup').style.display = '';
  } else {
    typeSelect.innerHTML = '<option value="收入">拨入（系统发放）</option><option value="支出">取出（提到手上）</option>';
    document.getElementById('formDescLabel').textContent = '备注';
    document.getElementById('formDesc').placeholder = '如：2025年10月经费';
    document.getElementById('formPersonGroup').style.display = 'none';
  }
  
  document.getElementById('formDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('formDesc').value = '';
  document.getElementById('formPerson').value = '';
  document.getElementById('formAmount').value = '';
  calcBalance();
  
  document.getElementById('modalTitle').textContent = currentModule === 'hand' ? '新增小金罐记录' : '新增系统账户记录';
  document.getElementById('btnSubmit').textContent = '确认添加';
  document.getElementById('btnDelete').style.display = 'none';
}

function openEdit(id) {
  editingId = id;
  const data = getData();
  const record = data.find(d => d.id === id);
  if (!record) return;
  
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('show');
  
  const typeSelect = document.getElementById('formType');
  if (currentModule === 'hand') {
    typeSelect.innerHTML = '<option value="支出">支出</option><option value="收入">收入</option>';
    document.getElementById('formDescLabel').textContent = '说明';
    document.getElementById('formDesc').placeholder = '如：xxx生日（6人参加）';
    document.getElementById('formPersonGroup').style.display = '';
    document.getElementById('formPerson').value = record.person || '';
  } else {
    typeSelect.innerHTML = '<option value="收入">拨入（系统发放）</option><option value="支出">取出（提到手上）</option>';
    document.getElementById('formDescLabel').textContent = '备注';
    document.getElementById('formDesc').placeholder = '如：2025年10月经费';
    document.getElementById('formPersonGroup').style.display = 'none';
  }
  
  typeSelect.value = record.type;
  document.getElementById('formDate').value = record.date;
  document.getElementById('formDesc').value = record.desc;
  document.getElementById('formAmount').value = record.amount;
  
  document.getElementById('formBalance').value = `¥${record.balance < 0 ? '-' : ''}${fmt(record.balance)}`;
  
  document.getElementById('modalTitle').textContent = '编辑记录 #' + id;
  document.getElementById('btnSubmit').textContent = '保存修改';
  document.getElementById('btnDelete').style.display = '';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function calcBalance() {
  const data = getData();
  let prevBal = 0;
  if (editingId !== null) {
    // For editing: prev balance is the balance of the record before this one
    const idx = data.findIndex(d => d.id === editingId);
    prevBal = idx > 0 ? data[idx - 1].balance : 0;
  } else {
    // For new: prev balance is the last record's balance
    prevBal = data.length ? data[data.length - 1].balance : 0;
  }
  const type = document.getElementById('formType').value;
  const amount = parseFloat(document.getElementById('formAmount').value) || 0;
  let newBal;
  if (type === '收入') newBal = prevBal + amount;
  else newBal = prevBal - amount;
  document.getElementById('formBalance').value = `¥${newBal < 0 ? '-' : ''}${fmt(newBal)}`;
  return newBal;
}

document.getElementById('formType').addEventListener('change', calcBalance);
document.getElementById('formAmount').addEventListener('input', calcBalance);

function submitForm() {
  const type = document.getElementById('formType').value;
  const date = document.getElementById('formDate').value;
  const desc = document.getElementById('formDesc').value.trim();
  const person = document.getElementById('formPerson').value.trim();
  const amount = parseFloat(document.getElementById('formAmount').value);
  
  if (!date) { alert('请选择时间'); return; }
  if (!desc) { alert('请输入说明'); return; }
  if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
  
  let data = getData();
  
  if (editingId !== null) {
    // Edit mode: update existing record
    const idx = data.findIndex(d => d.id === editingId);
    if (idx === -1) return;
    data[idx].type = type;
    data[idx].date = date;
    data[idx].desc = desc;
    data[idx].amount = amount;
    if (currentModule === 'hand') data[idx].person = person || '/';
    recalcBalances(data, idx);
    setData(data);
  } else {
    // New record mode
    const newId = data.length ? Math.max(...data.map(d=>d.id)) + 1 : 1;
    const record = { id: newId, type, desc, amount, date, balance: 0 };
    if (currentModule === 'hand') record.person = person || '/';
    data.push(record);
    recalcBalances(data, data.length - 1);
    setData(data);
  }
  
  closeModal();
  currentFilter = 'all';
  currentPage = 1;
  renderAll();
}

function deleteRecord() {
  if (editingId === null) return;
  if (!confirm('确定删除这条记录？删除后余额将自动重算。')) return;
  
  let data = getData();
  const idx = data.findIndex(d => d.id === editingId);
  if (idx === -1) return;
  
  data.splice(idx, 1);
  // Recalculate all balances from the deleted position onward
  if (data.length > 0) recalcBalances(data, Math.min(idx, data.length - 1));
  setData(data);
  
  closeModal();
  renderAll();
}

function recalcBalances(data, fromIdx) {
  for (let i = fromIdx; i < data.length; i++) {
    const prevBal = i > 0 ? data[i-1].balance : 0;
    if (data[i].type === '收入') {
      data[i].balance = Math.round((prevBal + data[i].amount) * 100) / 100;
    } else {
      data[i].balance = Math.round((prevBal - data[i].amount) * 100) / 100;
    }
  }
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ===== INIT =====
renderAll();
</script>
